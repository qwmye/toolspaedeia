{% for course in courses %}
    {% include "courses/partials/course_article.html" with course=course %}
{% empty %}
    <article>{{ empty_message }}</article>
{% endfor %}

{% if page_obj.has_next %}
    {# djlint:off #}
    <article hx-get="?{% if query %}q={{ query|urlencode }}&{% endif %}page={{ page_obj.next_page_number }}"
             hx-trigger="revealed"
             hx-swap="outerHTML"
             aria-live="polite">
        <p>
            Loading more courses...
        </p>
        <progress />
    </article>
    {# djlint:on #}
{% endif %}
