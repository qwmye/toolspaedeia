            <form>
                <button formaction="{% url 'home' %}"

                    <i class="fi fi-sr-house-chimney"></i>
                </button>
            </form>
        </li>
    </ul>
    <ul>
        <li>
            <form>

            </form>
        </li>
        <li>
            <form>
