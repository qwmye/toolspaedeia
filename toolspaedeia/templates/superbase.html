<!DOCTYPE html>
<html lang="en"
      {% if theme_mode %}
          data-theme="{{ theme_mode }}"
      {% endif %}>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport"
              content="width=device-width, initial-scale=1" />
        <meta name="keywords"
              content="toolspaedeia, tools, paedeia, education" />
        <meta name="description"
              content="Toolspaedeia is an education tool that helps students learn about tools and practices." />
        <meta name="color-scheme"
              content="light dark" />
        {% if color_theme %}
            <link rel="stylesheet"
                  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.{{ color_theme }}.min.css" />
        {% else %}
            <link rel="stylesheet"
                  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
        {% endif %}
        <title>{{ title }}</title>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
                integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
                crossorigin="anonymous"
                defer></script>
        <link href=" https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/all/all.min.css "
              rel="stylesheet" />

        {% block head %}
        {% endblock head %}
    </head>
    <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <header class="container">
            <nav>
                {% block nav %}
                    <ul>
                        <li>
                            <h1>
                                <a href="{% url 'home' %}">Toolspaedeia</a>
                            </h1>
                        </li>
                    </ul>
                {% endblock nav %}
            </nav>
            <nav aria-label="site navigation">
                <ul>
                    {% block site_nav %}
                    {% endblock site_nav %}
                </ul>
            </nav>
            <nav aria-label="breadcrumb">
                <ul>
                    {% block breadcrumbs %}
                    {% endblock breadcrumbs %}
                </ul>
            </nav>
            <hr />
        </header>
        <main class="container">
            {% block content %}
            {% endblock content %}
        </main>
    </body>
</html>
