{% extends "users_base.html" %}

{% block content %}
    <h2>
        User Settings - {{ request.user.get_full_name|default:request.user.username }}
    </h2>
    <hr />
    {% if request.user.settings.profile_picture %}
        <img src="{{ request.user.settings.profile_picture.url }}"
             width="128"
             height="128"
             alt="Profile Picture"
             class="profile-picture" />
    {% endif %}
    <form method="post"
          enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">
            Save Changes
        </button>
    </form>
{% endblock content %}
